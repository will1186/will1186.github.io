title: DPRK IT Worker — Suspicious Payroll and Account Activity
id: 7d0e5b2c-4f6a-8c9d-1e3b-2a5f7b0d9c4e
status: experimental
description: |
    Detects account manipulation patterns consistent with DPRK IT worker 
    operations — rapid onboarding followed by payment method changes, 
    access to financial systems disproportionate to role, and attempts 
    to modify direct deposit or payment routing information.
references:
    - https://www.justice.gov/opa/pr/justice-department-charges-five-individuals-multi-year-scheme-generate-revenue-north-korean
author: Will Welch
date: 2026/04/12
tags:
    - attack.persistence
    - attack.t1098       # Account Manipulation
    - attack.t1078.004   # Cloud Accounts
logsource:
    category: application
    product: generic
detection:
    # Payment method changes within first 30 days of account creation
    payment_change:
        EventType: 'AccountModification'
        ModifiedField|contains:
            - 'direct_deposit'
            - 'bank_account'
            - 'routing_number'
            - 'payment_method'
            - 'payoneer'
            - 'paypal'

    # Access to HR/payroll systems from remote access tools
    hr_access_via_rat:
        DestinationHostname|contains:
            - 'workday'
            - 'adp.com'
            - 'paylocity'
            - 'gusto.com'
            - 'bamboohr'
        SourceProcess|endswith:
            - '\AnyDesk.exe'
            - '\TeamViewer.exe'
            
    # Multiple account creations from same device fingerprint
    multi_account:
        EventType: 'AccountCreation'
        # Group by device fingerprint / hardware ID
        
    condition: payment_change or hr_access_via_rat
    
falsepositives:
    - New employees legitimately updating payment information
    - HR administrators accessing payroll systems remotely
level: medium
---
title: DPRK IT Worker — Source Code Exfiltration Indicators
id: 8e1f6c3d-5a7b-9d0e-2f4c-3b6a8c1e0d5f
status: experimental
description: |
    Detects indicators of source code and IP theft by DPRK IT worker 
    operatives. After establishing access as contractors, DPRK workers 
    have been observed cloning entire repositories, downloading proprietary 
    codebases, and exfiltrating data via personal cloud storage or 
    encrypted channels.
references:
    - https://www.cisa.gov/news-events/cybersecurity-advisories/aa24-249a
author: Will Welch
date: 2026/04/12
tags:
    - attack.exfiltration
    - attack.t1567.002   # Exfiltration to Cloud Storage
    - attack.collection
    - attack.t1213       # Data from Information Repositories
logsource:
    category: process_creation
    product: windows
detection:
    # Bulk git clone operations
    bulk_clone:
        Image|endswith:
            - '\git.exe'
        CommandLine|contains:
            - 'clone'
            - '--mirror'
            - '--bare'

    # Upload to personal cloud storage
    cloud_exfil:
        DestinationHostname|contains:
            - 'drive.google.com'
            - 'dropbox.com'
            - 'mega.nz'
            - 'anonfiles.com'
            - 'transfer.sh'
            - 'file.io'

    # Archive creation of source directories
    source_archive:
        CommandLine|contains:
            - '.git'
            - 'src'
            - 'source'
            - 'repo'
        Image|endswith:
            - '\7z.exe'
            - '\rar.exe'
            - '\tar.exe'
            
    condition: bulk_clone and (cloud_exfil or source_archive)
    
falsepositives:
    - Developers cloning repositories for legitimate work
    - CI/CD pipelines performing mirror operations
    - Authorized backup procedures
level: high
