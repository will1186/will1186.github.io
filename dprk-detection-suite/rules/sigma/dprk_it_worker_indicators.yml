title: DPRK IT Worker Fraud — Remote Access and Identity Anomalies
id: 6c9d4a1b-3e5f-7b8c-0d2a-1f4e6a9c8b3d
status: experimental
description: |
    Detects behavioral indicators of DPRK IT worker fraud operations based on 
    DOJ indictments and FBI/CISA advisories. North Korean operatives obtain 
    remote contractor positions at US/EU companies using stolen identities, 
    AI-generated photos, and laptop farms. Key indicators include KVM-over-IP 
    usage, VPN endpoint cycling across geographically inconsistent locations, 
    multiple concurrent RDP sessions from a single origin, and remote access 
    tool stacking (AnyDesk + TeamViewer + RDP simultaneously).
references:
    - https://www.justice.gov/opa/pr/justice-department-charges-five-individuals-multi-year-scheme-generate-revenue-north-korean
    - https://www.cisa.gov/news-events/cybersecurity-advisories/aa24-249a
    - https://attack.mitre.org/techniques/T1078/
author: Will Welch
date: 2026/04/12
tags:
    - attack.initial_access
    - attack.t1078       # Valid Accounts
    - attack.t1133       # External Remote Services
    - attack.persistence
    - attack.t1098       # Account Manipulation
logsource:
    category: process_creation
    product: windows
detection:
    # Remote access tool stacking — multiple RATs running simultaneously
    # DPRK operators use layered remote access to maintain control
    rat_stacking:
        Image|endswith:
            - '\AnyDesk.exe'
            - '\TeamViewer.exe'
            - '\rustdesk.exe'
            - '\ScreenConnect.ClientService.exe'
            - '\LogMeIn.exe'

    # KVM-over-IP indicators — hardware remote access to laptop farms
    kvm_indicators:
        Image|endswith:
            - '\TightVNC.exe'
            - '\tvnserver.exe'
            - '\winvnc.exe'
        CommandLine|contains:
            - '-controlservice'
            - '-start'

    # Multiple VPN client processes — endpoint cycling
    vpn_cycling:
        Image|endswith:
            - '\openvpn.exe'
            - '\ExpressVPN.exe'
            - '\NordVPN.exe'
            - '\Surfshark.exe'
            - '\ProtonVPN.exe'

    # IP geolocation anomaly — login from inconsistent locations
    # Requires correlation with authentication logs
    geo_anomaly:
        EventID: 4624
        LogonType: 10  # RemoteInteractive (RDP)

    condition: rat_stacking or (kvm_indicators and vpn_cycling)

falsepositives:
    - IT support personnel using multiple remote access tools
    - Developers with legitimate VPN usage across regions
    - Managed service providers with layered remote access
level: high
