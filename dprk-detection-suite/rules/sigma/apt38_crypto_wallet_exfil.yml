title: APT38 Cryptocurrency Clipboard Monitoring
id: 5b8c3f0a-2d4e-6a7b-9c1f-0e3d5a8b7c2f
status: experimental
description: |
    Detects clipboard monitoring behavior consistent with APT38 cryptocurrency 
    address swapping attacks. The attacker monitors the clipboard for crypto 
    wallet address patterns and replaces them with attacker-controlled addresses.
references:
    - https://www.ic3.gov/Media/News/2022/220516.pdf
author: Will Welch
date: 2026/04/12
tags:
    - attack.collection
    - attack.t1115  # Clipboard Data
logsource:
    category: process_creation
    product: windows
detection:
    # Process with clipboard API access + network connectivity
    clipboard_monitor:
        CommandLine|contains:
            - 'GetClipboardData'
            - 'SetClipboardData'
            - 'AddClipboardFormatListener'
    
    # PowerShell clipboard access — common in DPRK tooling
    ps_clipboard:
        Image|endswith: '\powershell.exe'
        CommandLine|contains:
            - 'Get-Clipboard'
            - 'Set-Clipboard'
            - '[System.Windows.Forms.Clipboard]'
            
    # Persistence for clipboard monitoring
    persistence:
        TargetFilename|contains: '\CurrentVersion\Run'
        
    condition: (clipboard_monitor or ps_clipboard) and persistence
    
falsepositives:
    - Clipboard manager utilities (Ditto, ClipX)
    - Password managers with clipboard integration
level: high
